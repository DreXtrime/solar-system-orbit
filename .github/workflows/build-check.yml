name: Test Build on PR
on:
  pull_request:
    branches:
      - beta
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build