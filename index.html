<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>three.js app</title>
        <style>
            body {
                margin: 0;
            }
        </style>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <script type="module" src="/src/index.js"></script>
        <div id="fade-overlay"></div>
        <canvas id="line-canvas"></canvas>
        <div id="hint">
            <p>🖱 Drag to orbit · Scroll to zoom</p>
        </div>
        <!--  Tooltip  -->
        <div id="tooltip" class="glass-panel hidden">
            <p id="tooltip-name"></p>
            <p id="tooltip-size"></p>
            <p id="tooltip-distance"></p>
        </div>
        <!--  Controls  -->
        <div id="controls" class="glass-panel">
            <button id="btn-playpause">Pause</button>
            <input
                type="range"
                id="speed-slider"
                min="0.1"
                max="10"
                step="0.1"
                value="1"
            />
            <span id="speed-label">1x</span>
        </div>
        <!--  Planet Panel  -->
        <div id="planet-panel" class="glass-panel">
            <div id="panel-inner">
                <!-- List View -->
                <div id="list-view">
                    <h2>Planets</h2>
                    <ul id="planet-list"></ul>
                    <button id="btn-add-planet">Add Planet</button>
                </div>
                <!-- Planet Edit View -->
                <canvas id="planet-preview"></canvas>
                <div id="edit-view" class="hidden">
                    <button id="btn-back">← Back</button>
                    <h2 id="edit-title">Edit Planet</h2>
                    <label>Name <input type="text" id="edit-name" /></label>
                    <div id="extra-planet-fields">
                        <label
                            >Color <input type="color" id="edit-color"
                        /></label>
                        <label
                            >Size
                            <input
                                type="range"
                                id="edit-size"
                                min="0.1"
                                max="20"
                                step="0.1"
                        /></label>
                        <label id="label-distance"
                            >Orbit Distance
                            <input
                                type="range"
                                id="edit-distance"
                                min="0.1"
                                max="50"
                                step="0.1"
                        /></label>
                        <label
                            >Year Duration
                            <input
                                type="range"
                                id="edit-year"
                                min="0.05"
                                max="20"
                                step="0.1"
                        /></label>
                        <div id="moon-section">
                            <hr />
                            <h3>Moons</h3>
                            <ul id="moon-list"></ul>
                            <button id="btn-add-moon">Add Moon</button>
                        </div>
                    </div>
                    <button id="btn-delete">Delete</button>
                </div>
                <!--  Moon Edit View  -->
                <div id="moon-edit-view" class="hidden">
                    <button id="btn-moon-back">← Back</button>
                    <h2 id="moon-edit-title">Edit Moon</h2>
                    <label
                        >Name <input type="text" id="moon-edit-name"
                    /></label>
                    <div id="extra-moon-fields">
                        <label
                            >Color <input type="color" id="moon-edit-color"
                        /></label>
                        <label
                            >Size
                            <input
                                type="range"
                                id="moon-edit-size"
                                min="0.05"
                                max="2"
                                step="0.05"
                        /></label>
                        <label
                            >Orbit Distance
                            <input
                                type="range"
                                id="moon-edit-distance"
                                min="0.5"
                                max="10"
                                step="0.1"
                        /></label>
                        <label
                            >Orbit Speed
                            <input
                                type="range"
                                id="moon-edit-speed"
                                min="0.1"
                                name="5"
                                step="0.1"
                        /></label>
                    </div>
                    <button id="btn-moon-delete">Delete</button>
                </div>
            </div>
        </div>
        <!--  Info panel  -->
        <div id="info-panel" class="glass-panel">
            <div id="panel-inner">
                <button id="btn-close-info">✕</button>
                <div id="planet-image-container">
                    <img id="planet-image" />
                    <h2 id="planet-title"></h2>
                </div>
                <div id="panel-body">
                    <h3>Description</h3>
                    <p id="planet-description"></p>
                    <h3>Stats</h3>
                    <ul id="planet-stats"></ul>
                    <h3>Facts</h3>
                    <ul id="planet-facts"></ul>
                </div>
            </div>
        </div>
    </body>
</html>
