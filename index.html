<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>three.js app</title>
        <style>
            body {
                margin: 0;
            }
        </style>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <script type="module" src="/src/index.js"></script>
        <!--  Tooltip  -->
        <div id="tooltip" class="glass-panel hidden">
          <p id="tooltip-name"></p>
          <p id="tooltip-size"></p>
          <p id="tooltip-distance"></p>
        </div>
        <!--  Controls  -->
        <div id="controls" class="glass-panel">
            <button id="btn-playpause">Pause</button>
            <input
                type="range"
                id="speed-slider"
                min="0.1"
                max="10"
                step="0.1"
                value="1"
            />
            <span id="speed-label">1x</span>
        </div>
    </body>
</html>
